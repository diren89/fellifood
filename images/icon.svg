<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Amber rounded background -->
  <rect width="512" height="512" rx="115" fill="#E8B468"/>
  <!-- Glossy overlay -->
  <rect width="512" height="512" rx="115" fill="url(#gloss)" opacity="0.18"/>
  <defs>
    <linearGradient id="gloss" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Plate (white circle) -->
  <circle cx="256" cy="272" r="130" fill="white" opacity="0.95"/>
  <!-- Plate inner ring -->
  <circle cx="256" cy="272" r="100" fill="none" stroke="white" stroke-width="6" opacity="0.3"/>
  <!-- Plate shadow/depth -->
  <circle cx="256" cy="272" r="130" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="4"/>

  <!-- Fork (left) -->
  <g fill="#6b4c1e" opacity="0.85">
    <!-- Handle -->
    <rect x="148" y="310" width="16" height="82" rx="8"/>
    <!-- Tines stem -->
    <rect x="148" y="172" width="16" height="90" rx="5"/>
    <!-- Left tine -->
    <rect x="135" y="148" width="10" height="52" rx="5"/>
    <!-- Middle tine -->
    <rect x="151" y="148" width="10" height="52" rx="5"/>
    <!-- Right tine -->
    <rect x="167" y="148" width="10" height="52" rx="5"/>
  </g>

  <!-- Knife (right) -->
  <g fill="#6b4c1e" opacity="0.85">
    <!-- Handle -->
    <rect x="348" y="310" width="16" height="82" rx="8"/>
    <!-- Blade -->
    <path d="M348 172 Q348 148 364 148 L364 262 Q356 265 348 262 Z" rx="4"/>
  </g>
</svg>
